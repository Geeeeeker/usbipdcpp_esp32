name: Build ESP32-S3 USB/IP Server

on:
  push:
    branches: [ "main", "master" ]
    paths-ignore:
      - '**.md'
      - 'changelog.md'
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:   # 允许手动触发

env:
  ESP_IDF_VERSION: v5.5   # 与项目要求的 ESP-IDF 版本一致
  TARGET_CHIP: esp32s3

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'   # 关键：拉取 usbipdcpp 子模块

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: ${{ env.ESP_IDF_VERSION }}
          target: ${{ env.TARGET_CHIP }}

      - name: Verify environment
        run: |
          . $IDF_PATH/export.sh
          idf.py --version
          echo "IDF_PATH=$IDF_PATH" >> $GITHUB_ENV

      - name: Build firmware
        run: |
          . $IDF_PATH/export.sh
          idf.py set-target ${{ env.TARGET_CHIP }}
          # 如果项目已有 sdkconfig，直接构建；否则使用默认配置
          idf.py build

      - name: Archive build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esp32s3-usbip-firmware
          path: |
            build/bootloader/bootloader.bin
            build/partition_table/partition-table.bin
            build/usbipdcpp_esp32.bin   # 项目生成的固件名可能是这个，也可能是 usbip_server.bin
            build/flash_args
            build/flash_project_args
          retention-days: 30

      - name: Prepare release assets (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p release
          cp build/bootloader/bootloader.bin release/
          cp build/partition_table/partition-table.bin release/
          # 根据实际生成的 bin 文件名调整，常见为项目名.bin
          cp build/*.bin release/   # 复制所有 bin 文件
          cd build && zip -r ../release/firmware-full.zip . && cd ..

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
