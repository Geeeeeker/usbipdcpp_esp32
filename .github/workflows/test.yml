name: Build ESP32 USB/IP Server

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target chip'
        required: true
        default: 'esp32s3'
        type: choice
        options:
          - esp32s3
          - esp32s2
      wifi_ssid:
        description: 'WiFi SSID'
        required: true
        type: string
        default: 'MyWiFi'
      wifi_password:
        description: 'WiFi Password'
        required: true
        type: string
        default: 'password123'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Fix missing main/include directory
        run: |
          if [ -f "main/CMakeLists.txt" ] && grep -q "INCLUDE_DIRS.*include" main/CMakeLists.txt; then
            mkdir -p main/include
          fi

      - name: Configure WiFi and disable Ethernet
        run: |
          # 删除旧配置，强制重新生成
          rm -f sdkconfig
          # 写入 WiFi 配置（请根据项目实际 Kconfig 调整变量名）
          echo "CONFIG_USBIPD_WIFI_SSID=\"${{ github.event.inputs.wifi_ssid }}\"" >> sdkconfig.defaults
          echo "CONFIG_USBIPD_WIFI_PASSWORD=\"${{ github.event.inputs.wifi_password }}\"" >> sdkconfig.defaults
          # 彻底禁用所有以太网相关组件
          echo "CONFIG_ETH_ENABLED=n" >> sdkconfig.defaults
          echo "CONFIG_ESP_ETH_ENABLED=n" >> sdkconfig.defaults
          echo "CONFIG_ETH_USE_ESP32_EMAC=n" >> sdkconfig.defaults
          echo "CONFIG_ETH_USE_OPENETH=n" >> sdkconfig.defaults
          echo "CONFIG_ETH_USE_SPI_ETHERNET=n" >> sdkconfig.defaults
          # 如果项目中有专门的 USBIP 配置，也可以保留

      - name: Build with ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5
          target: ${{ github.event.inputs.target }}
          path: .
          command: |
            # 可选：再次通过 idf.py 设置禁用以太网（确保生效）
            idf.py build

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: usbip-firmware-${{ github.event.inputs.target }}
          path: |
            build/*.bin
            build/bootloader/*.bin
            build/partition_table/*.bin
          if-no-files-found: error
          retention-days: 7
