name: Build ESP32-S3 USB/IP Server

on:
  push:
    branches: [ "main", "master" ]
    paths-ignore:
      - '**.md'
      - 'changelog.md'
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  ESP_IDF_VERSION: v5.5
  TARGET_CHIP: esp32s3

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Fix missing main/include directory
        run: |
          if [ -f "main/CMakeLists.txt" ] && grep -q "INCLUDE_DIRS.*include" main/CMakeLists.txt; then
            if [ ! -d "main/include" ]; then
              echo "Creating missing main/include directory"
              mkdir -p main/include
            fi
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ESP-IDF
        id: install-idf
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: ${{ env.ESP_IDF_VERSION }}
          target: ${{ env.TARGET_CHIP }}

      - name: Build firmware
        run: |
          . ${{ steps.install-idf.outputs.idf_path }}/export.sh
          idf.py set-target ${{ env.TARGET_CHIP }}
          idf.py build

      - name: Archive build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esp32s3-usbip-firmware
          path: |
            build/bootloader/bootloader.bin
            build/partition_table/partition-table.bin
            build/*.bin
            build/flash_args
          retention-days: 30

      - name: Prepare release assets
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p release
          cp build/bootloader/bootloader.bin release/
          cp build/partition_table/partition-table.bin release/
          cp build/*.bin release/
          cd build && zip -r ../release/firmware-full.zip . && cd ..

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
