name: Build ESP32-S3 USB/IP Server

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      target:
        description: 'ESP32 chip target'
        required: true
        default: 'esp32s3'
        type: choice
        options:
          - esp32
          - esp32s2
          - esp32s3
          - esp32c3
          - esp32c5
          - esp32c6

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Fix missing main/include directory
        # 项目 CMakeLists.txt 引用了 main/include，但目录缺失，创建空目录避免编译错误
        run: |
          if [ -f "main/CMakeLists.txt" ] && grep -q "INCLUDE_DIRS.*include" main/CMakeLists.txt; then
            mkdir -p main/include
          fi

      - name: Build with ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5   # 你的项目要求 v5.5
          target: ${{ github.event.inputs.target || 'esp32s3' }}
          path: .
          command: |
            # 保留项目原有的 sdkconfig（已配置 PSRAM、USB-OTG 等）
            # 若需要清理旧配置可取消下一行注释
            # rm -f sdkconfig
            idf.py build

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: usbip-firmware-${{ github.event.inputs.target || 'esp32s3' }}
          path: |
            build/*.bin
            build/bootloader/*.bin
            build/partition_table/*.bin
          if-no-files-found: error
          retention-days: 7
